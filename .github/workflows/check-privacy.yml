name: Privacy Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check-privacy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run privacy check
      run: |
        chmod +x scripts/check-privacy.sh
        bash scripts/check-privacy.sh

    - name: Check for template placeholders
      run: |
        if grep -r "【待填】" profile/ template/; then
          echo "✓ Found template placeholders - good!"
          exit 0
        else
          echo "⚠ No placeholders found - make sure profile/ and template/ are in template state"
          exit 1
        fi
