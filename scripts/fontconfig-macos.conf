<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- LibreOffice headless 在 macOS 上不会稳定发现系统中文字体。 -->
<fontconfig>
  <dir>/System/Library/Fonts</dir>
  <dir>/System/Library/Fonts/Supplemental</dir>
  <dir>/Library/Fonts</dir>
  <cachedir>/private/tmp/person-os-fontconfig-cache</cachedir>
  <alias>
    <family>SimSun</family>
    <prefer><family>Songti SC</family></prefer>
    <prefer><family>STSong</family></prefer>
  </alias>
  <alias>
    <family>Microsoft YaHei</family>
    <prefer><family>Hiragino Sans GB</family></prefer>
  </alias>
</fontconfig>
